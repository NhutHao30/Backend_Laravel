version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dola_rabbitmq
    ports:
      - "5672:5672"   # Port dùng cho Worker kết nối
      - "15672:15672" # Port dùng cho Giao diện quản lý Web
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/

volumes:
  rabbitmq_data:
